<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calories Calculator</title>
  <link rel="stylesheet" href="../htdoc/test/CSS/calories-cal.css">
</head>
<body>

<div class="container">
  <h2>Calories Calculator</h2>

  <input type="number" id="age" placeholder="Age">
  <input type="number" id="weight" placeholder="Weight (kg)">
  <input type="number" id="height" placeholder="Height (cm)">

  <select id="gender">
    <option value="male">Male</option>
    <option value="female">Female</option>
  </select>

  <select id="activity">
    <option value="1.2">Not Very Active (only sitting)</option>
    <option value="1.375">Somewhat Active(mostly sitting)</option>
    <option value="1.55">Active(a lot of walking)</option>
    <option value="1.725">Very Active(hard physical labour)</option>
  </select>

  <button onclick="calculateCalories()">Calculate</button>

  <div id="result"></div>
</div>

<script src="../cal.js"></script>
</body>
</html>
