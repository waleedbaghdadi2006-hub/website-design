<div class="main-content">
    <div class="admin-header">
        <div class="header-title">
            <h1><i class="fas fa-dumbbell"></i> Manage Your Supplements</h1>
            <p>Add ,Edit ,Or Delete Product </p>
        </div>
        <!-- <div class="admin-actions">

<!-- add a new product button -->

    <div class="product-form-container" id="productForm">
        <div class="form-title">
            <i class="fas fa-plus-circle"></i>
            <span id="formTitle">Add a new product</span>
        </div>
        <div class="form-grid">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="productName" placeholder="e.g: Whey Protein Gold">
            </div>
            <div class="form-group">
                <label>Price(€)</label>
                <input type="number" id="productPrice" placeholder="49.99">
            </div>
            <div class="form-group">
                <label>amount at stock</label>
                <input type="number" id="productStock" placeholder="50">
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="number" id="productStock" placeholder="e.g:High-quality etc..">
            </div>

            <div class="form-group ">
                <label>Flavours</label>
                <input rows="3" id="Flavours" placeholder="5"></input>
            </div>

     <div class="form-group ">
                <label>Product Image</label>
                <div class="image-upload-area" id="uploadArea">
                <input type="file" id="imageInput" accept="image/*">
                </div>
               <div class="image-preview" id="imagePreview">
               <img id="previewImg" src="">
              <button type="button" class="remove-image" id="removeBtn">Delete</button>
              </div>

               <div class="form-actions">
               <button class="btn-save" onclick="saveProduct()">Save Product</button>
               <button class="btn-cancel" onclick="toggleForm()">Cancel</button>
              </div>
             </div>
    </div>
    </div>
    <div class="products-table-wrapper">
        <table class="products-table">
            <thead>
                <tr><th>Image</th><th>Product Name </th><th>Description</th><th>Price</th><th>Flavours</th><th>Procedure</th></tr>
            </thead>
            <tbody id="productsTableBody">
              
            </tbody>
        </table>
    </div>
